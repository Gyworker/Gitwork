# =============================================================================
# GitHub Actions CI - 市场咨询任务跟踪工具
# =============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      check_type:
        description: '检查类型'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - syntax
          - test

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'syntax' || github.event.inputs.check_type == '' || github.event.inputs.check_type == 'full'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Check Python syntax
        run: |
          echo "=== Syntax Check ==="
          python -m py_compile src/config.py 2>&1 && echo "OK: config.py"
          
          for f in src/utils/*.py; do
            python -m py_compile "$f" 2>&1 && echo "OK: $f"
          done
          
          for f in src/database/*.py; do
            python -m py_compile "$f" 2>&1 && echo "OK: $f"
          done
          
          for f in src/ui/*.py; do
            python -m py_compile "$f" 2>&1 && echo "OK: $f"
          done
          
          for f in src/core/*.py; do
            python -m py_compile "$f" 2>&1 && echo "OK: $f"
          done
          
          echo ""
          echo "All syntax checks passed!"

  unit-tests:
    runs-on: ubuntu-latest
    if: github.event.inputs.check_type == 'test' || github.event.inputs.check_type == 'full'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov PyQt5 pandas openpyxl Pillow colorlog PyYAML python-dateutil psutil
      
      - name: Run Unit Tests
        run: |
          echo "=== Running Unit Tests ==="
          cd D:/GITwork
          python -m pytest src/tests/test_core.py -v --tb=short || true
          python -m pytest src/tests/test_database.py -v --tb=short || true
          
      - name: Run Performance Tests
        run: |
          echo "=== Running Performance Tests ==="
          cd D:/GITwork
          python -m pytest src/tests/test_performance.py -v --tb=short -m "not slow" || true
          
      - name: Generate Coverage Report
        if: success()
        run: |
          echo "=== Test Summary ==="
          echo "All tests completed!"
