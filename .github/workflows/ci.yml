# =============================================================================
# GitHub Actions CI - Minimal Version
# =============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Check Python syntax
        run: |
          python -m py_compile src/config.py
          echo "OK: config.py"
          
          for f in src/utils/*.py; do
            python -m py_compile "$f"
            echo "OK: $f"
          done
          
          for f in src/database/*.py; do
            python -m py_compile "$f"
            echo "OK: $f"
          done
          
          echo ""
          echo "All syntax checks passed!"
